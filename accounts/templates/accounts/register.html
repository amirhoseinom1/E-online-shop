{% load crispy_forms_tags %}

{% block content %}

        <form action="" method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3" value="Send">Send</button>
        </form>
    </div>
{% endblock %}
